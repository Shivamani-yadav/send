<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SafeLink - Send Pair Request</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            min-height: 100vh;
            background: url('https://images.unsplash.com/photo-1521791136064-7986c2920216') no-repeat center center/cover;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            padding: 20px;
        }

        body::before {
            content: "";
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.65);
        }

        .container {
            position: relative;
            width: 100%;
            max-width: 420px;
            background: rgba(255, 255, 255, 0.10);
            backdrop-filter: blur(12px);
            border-radius: 18px;
            padding: 30px;
            color: white;
            box-shadow: 0 10px 28px rgba(0,0,0,0.35);
        }

        h2 {
            text-align: center;
            margin-bottom: 10px;
            font-size: 1.8rem;
        }

        .subtitle {
            text-align: center;
            color: #ddd;
            font-size: 0.95rem;
            margin-bottom: 25px;
            line-height: 1.5;
        }

        .flash {
            background: rgba(255, 255, 255, 0.12);
            border-radius: 10px;
            padding: 10px 14px;
            margin-bottom: 15px;
            font-size: 0.92rem;
            text-align: center;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.95rem;
            font-weight: 500;
        }

        input {
            width: 100%;
            padding: 12px 14px;
            border: none;
            outline: none;
            border-radius: 10px;
            margin-bottom: 18px;
            font-size: 0.95rem;
        }

        input::placeholder {
            color: #666;
        }

        .btn {
            width: 100%;
            border: none;
            padding: 12px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 500;
            color: white;
            background: linear-gradient(45deg, #00c6ff, #0072ff);
            transition: 0.3s;
        }

        .btn:hover {
            transform: scale(1.03);
            opacity: 0.92;
        }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 18px;
            color: #ffcf8b;
            text-decoration: none;
            font-weight: 500;
        }

        .back-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Send Pair Request</h2>
    <p class="subtitle">
        Enter the phone number or email of the trusted registered user you want to pair with.
    </p>

    {% with messages = get_flashed_messages() %}
        {% if messages %}
            {% for message in messages %}
                <div class="flash">{{ message }}</div>
            {% endfor %}
        {% endif %}
    {% endwith %}

    <form method="POST">
        <label for="receiver">Phone or Email</label>
        <input type="text" id="receiver" name="receiver" placeholder="Enter phone or email" required>

        <button type="submit" class="btn">Send Request</button>
    </form>

    <a href="/dashboard" class="back-link">← Back to Dashboard</a>
</div>

</body>
</html>
