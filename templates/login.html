<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SafeLink - Login</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            height: 100vh;
            background: url('https://images.unsplash.com/photo-1498050108023-c5249f4df085') no-repeat center center/cover;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        /* Overlay */
        body::before {
            content: "";
            position: absolute;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.65);
            top: 0;
            left: 0;
        }

        .container {
            position: relative;
            width: 350px;
            padding: 30px;
            border-radius: 15px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(12px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.5);
            color: white;
            animation: fadeIn 0.8s ease-in-out;
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: none;
            border-radius: 8px;
            outline: none;
        }

        input::placeholder {
            color: #555;
        }

        .btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(45deg, #00c6ff, #0072ff);
            border: none;
            border-radius: 25px;
            color: white;
            font-weight: 500;
            cursor: pointer;
            margin-top: 10px;
            transition: 0.3s;
        }

        .btn:hover {
            transform: scale(1.05);
            opacity: 0.9;
        }

        .link {
            text-align: center;
            margin-top: 15px;
        }

        .link a {
            color: #ffb347;
            text-decoration: none;
            font-weight: 500;
        }

        .flash {
            text-align: center;
            margin-bottom: 10px;
            color: #ffcccc;
            font-size: 0.9rem;
        }

        @keyframes fadeIn {
            from {opacity: 0; transform: translateY(20px);}
            to {opacity: 1; transform: translateY(0);}
        }
    </style>
</head>

<body>

<div class="container">
    <h2>Login</h2>

    <!-- Flash Messages -->
    {% with messages = get_flashed_messages() %}
        {% if messages %}
            <div class="flash">
                {% for message in messages %}
                    <p>{{ message }}</p>
                {% endfor %}
            </div>
        {% endif %}
    {% endwith %}

    <form method="POST">
        <!-- IMPORTANT: name="identifier" matches app.py -->
        <input type="text" name="identifier" placeholder="Phone or Email" required>
        <input type="password" name="password" placeholder="Password" required>

        <button type="submit" class="btn">Login</button>
    </form>

    <div class="link">
        Don't have an account? <a href="/register">Register</a>
    </div>
</div>

</body>
</html>
