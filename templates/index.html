<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SafeLink - Home</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            height: 100vh;
            background: url('https://images.unsplash.com/photo-1500530855697-b586d89ba3ee') no-repeat center center/cover;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            position: relative;
        }

        /* Overlay */
        body::before {
            content: "";
            position: absolute;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            top: 0;
            left: 0;
        }

        .container {
            position: relative;
            text-align: center;
            max-width: 600px;
            padding: 40px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.5);
            animation: fadeIn 1s ease-in-out;
        }

        h1 {
            font-size: 2.8rem;
            margin-bottom: 15px;
            font-weight: 700;
        }

        p {
            font-size: 1.1rem;
            margin-bottom: 30px;
            line-height: 1.6;
            color: #ddd;
        }

        .btn-group a {
            text-decoration: none;
            padding: 12px 25px;
            margin: 10px;
            border-radius: 30px;
            font-weight: 500;
            transition: 0.3s;
            display: inline-block;
        }

        .btn-login {
            background: #00c6ff;
            color: white;
        }

        .btn-register {
            background: #ff6a00;
            color: white;
        }

        .btn-group a:hover {
            transform: scale(1.05);
            opacity: 0.9;
        }

        footer {
            margin-top: 25px;
            font-size: 0.9rem;
            color: #aaa;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media(max-width: 600px) {
            h1 {
                font-size: 2rem;
            }
        }
    </style>
</head>

<body>

<div class="container">
    <h1>SafeLink</h1>
    <p>
        A secure and consent-based live location sharing system.<br>
        Connect with trusted people and share your location safely during travel or emergencies.
    </p>

    <div class="btn-group">
        <a href="/login" class="btn-login">Login</a>
        <a href="/register" class="btn-register">Register</a>
    </div>

    <footer>
        © 2026 SafeLink | Built for Safety
    </footer>
</div>

</body>
</html>
